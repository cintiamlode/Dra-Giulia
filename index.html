<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conciliador Bancário V2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;max-width:1400px;margin:auto;padding:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:6px}
th{background:#f0f0f0}
</style>
</head>
<body>
<h2>Conciliador Bancário Santander V2</h2>

<p>Selecione um PDF do Santander.</p>
<input type="file" id="pdf" accept=".pdf">
<button onclick="lerPdf()">Processar PDF</button>
<button onclick="exportar()">Exportar Excel</button>

<table id="grid">
<thead>
<tr>
<th>Data</th><th>Tipo</th><th>CPF/CNPJ</th>
<th>Documento</th><th>Favorecido</th>
<th>Crédito</th><th>Débito</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let dados=[];

async function extrairTexto(file){
 const pdf=await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
 let texto='';
 for(let p=1;p<=pdf.numPages;p++){
   const page=await pdf.getPage(p);
   const tc=await page.getTextContent();
   texto += tc.items.map(i=>i.str).join('\n') + '\n';
 }
 return texto;
}

function br(v){
 return Number(v.replace(/\./g,'').replace(',','.'));
}

function parseSantander(text){
 const linhas=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
 const out=[];
 let data='';

 for(let i=0;i<linhas.length;i++){
   let l=linhas[i];

   const dm=l.match(/^(\d{2}\/\d{2})\s+(.*)$/);
   if(dm){ data=dm[1]+'/2026'; l=dm[2]; }

   const p=l.match(/^PIX RECEBIDO\s+(\d{11,14})\s*(\d{6})?\s*([\d\.]+,\d{2})/);
   if(p){
      out.push({
       Data:data,Tipo:'PIX_RECEBIDO',
       CPF_CNPJ:p[1],Documento:p[2]||'',
       Favorecido:'',Credito:br(p[3]),Debito:0
      });
      continue;
   }

   if(l.startsWith('PIX ENVIADO')){
      let fav=linhas[i+1]||'';
      let vm=(linhas[i+2]||'').match(/([\d\.]+,\d{2})/);
      out.push({
        Data:data,Tipo:'PIX_ENVIADO',
        CPF_CNPJ:'',Documento:'',
        Favorecido:fav,
        Credito:0,
        Debito:vm?br(vm[1]):0
      });
      i+=2;
   }
 }
 return out;
}

function render(){
 const tb=document.querySelector('#grid tbody');
 tb.innerHTML='';
 dados.forEach(r=>{
  tb.innerHTML += `<tr>
  <td>${r.Data||''}</td>
  <td>${r.Tipo||''}</td>
  <td>${r.CPF_CNPJ||''}</td>
  <td>${r.Documento||''}</td>
  <td>${r.Favorecido||''}</td>
  <td>${r.Credito||''}</td>
  <td>${r.Debito||''}</td>
  </tr>`;
 });
}

async function lerPdf(){
 const f=document.getElementById('pdf').files[0];
 if(!f) return alert('Selecione um PDF');
 const texto=await extrairTexto(f);
 dados=parseSantander(texto);
 render();
}

function exportar(){
 const wb=XLSX.utils.book_new();
 const ws=XLSX.utils.json_to_sheet(dados);
 XLSX.utils.book_append_sheet(wb,ws,'Conciliacao');
 XLSX.writeFile(wb,'conciliacao.xlsx');
}
</script>
</body>
</html>
